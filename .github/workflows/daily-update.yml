name: Daily Update

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Check and fix broken links
      id: link-check
      run: |
        npx markdown-link-check README.md -c .github/link-check-config.json || echo "found_broken=true" >> $GITHUB_OUTPUT

    - name: Update last updated date
      run: |
        DATE=$(date +'%B %d, %Y')
        # Add or update the last updated line
        if grep -q "Last updated:" README.md; then
          sed -i "s/Last updated: .*/Last updated: $DATE/" README.md
        else
          echo -e "\n---\n\n*Last updated: $DATE*" >> README.md
        fi

    - name: Count total tools
      run: |
        # Count all tool links (lines starting with "- [")
        TOOL_COUNT=$(grep -c "^- \[" README.md || echo 0)
        echo "Found $TOOL_COUNT tools"
        
        # Update the tool count in the header
        sed -i "s/🔥 \*\*[0-9]\+\+ AI coding tools\*\*/🔥 **$TOOL_COUNT+ AI coding tools**/" README.md

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: '🤖 Daily update'
        title: '🤖 Daily automated update'
        body: |
          ## Daily Update
          
          This PR contains automated updates:
          - ✅ Updated tool count
          - ✅ Updated last modified date
          - ✅ Checked for broken links
          
          Please review and merge if everything looks good!
        branch: daily-update-${{ github.run_number }}
        delete-branch: true