name: Weekly Trending Tools Check

on:
  schedule:
    # Runs every Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  check-trending:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Check trending AI coding repos
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cat > check_trending.py << 'EOF'
        import requests
        from datetime import datetime, timedelta

        # Search for trending AI coding tools from the past week
        week_ago = (datetime.now() - timedelta(days=7)).strftime('%Y-%m-%d')
        
        queries = [
            f"ai coding assistant created:>{week_ago} stars:>50",
            f"llm code created:>{week_ago} stars:>50",
            f"copilot alternative created:>{week_ago} stars:>50",
            f"ai developer tools created:>{week_ago} stars:>50"
        ]
        
        trending_tools = []
        
        for query in queries:
            url = f"https://api.github.com/search/repositories?q={query}&sort=stars&order=desc"
            headers = {"Authorization": f"token $GITHUB_TOKEN"} if "$GITHUB_TOKEN" else {}
            
            response = requests.get(url, headers=headers)
            if response.status_code == 200:
                data = response.json()
                for repo in data.get('items', [])[:5]:
                    trending_tools.append({
                        'name': repo['name'],
                        'url': repo['html_url'],
                        'description': repo['description'],
                        'stars': repo['stargazers_count'],
                        'created': repo['created_at']
                    })
        
        # Remove duplicates
        seen = set()
        unique_tools = []
        for tool in trending_tools:
            if tool['url'] not in seen:
                seen.add(tool['url'])
                unique_tools.append(tool)
        
        # Create issue if new tools found
        if unique_tools:
            issue_body = "# 🔥 Trending AI Coding Tools This Week\n\n"
            issue_body += "Found these new AI coding tools that might be worth adding:\n\n"
            
            for tool in sorted(unique_tools, key=lambda x: x['stars'], reverse=True)[:10]:
                issue_body += f"## [{tool['name']}]({tool['url']})\n"
                issue_body += f"⭐ {tool['stars']} stars | Created: {tool['created'][:10]}\n\n"
                if tool['description']:
                    issue_body += f"{tool['description']}\n\n"
                issue_body += "---\n\n"
            
            with open('trending_issue.md', 'w') as f:
                f.write(issue_body)
        EOF
        
        python check_trending.py

    - name: Create issue for trending tools
      if: ${{ success() }}
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          
          try {
            const issueBody = fs.readFileSync('trending_issue.md', 'utf8');
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔥 Weekly Trending AI Coding Tools',
              body: issueBody,
              labels: ['trending', 'enhancement']
            });
          } catch (error) {
            console.log('No new trending tools found');
          }